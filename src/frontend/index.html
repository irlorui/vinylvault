<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VinylVault</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>VinylVault</h1>

    <div class="controls">
      <button id="btn-new-song">NEW SONG</button>
      <button id="btn-reveal" disabled>REVEAL</button>
    </div>

    <div id="card" class="card hidden">
      <div class="card-inner">
        <div class="card-front"></div>
        <div class="card-back">
          <p id="track-name"></p>
          <p id="track-artist"></p>
          <p id="track-year"></p>
        </div>
      </div>
    </div>

    <button id="btn-play" class="hidden">&#9654; Play</button>
    <p id="error-msg" class="error hidden"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
